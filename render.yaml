services:
  - type: web
    name: crypto-pal-oracle-pro
    env: node
    plan: free
    buildCommand: npm install && cd server && npm install && npx prisma generate && cd .. && npm run build
    startCommand: cd server && npm start
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        fromValue: ${MONGO_URI}
      - key: JWT_SECRET
        fromValue: ${JWT_SECRET}
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        fromValue: ${SMTP_USER}
      - key: SMTP_PASS
        fromValue: ${SMTP_PASS}
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/server/prisma
      sizeGB: 1
